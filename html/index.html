<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoonLight Garden</title>
    <link rel="icon" type="image/x-icon" href="/img/iconTFG.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/main.js" type="module" defer></script>
  </head>

  <body>
    <main>
      <header>
        <div class="navbar" id="navMenu">
          <a href="/html/index.html">Inicio</a>
          <a href="">Documentación</a>
          <a href="/html/search.html">Busqueda</a>
          <a href="/html/statistics.html">Estadística</a>
          <a href="/html/calendar.html">Calendario</a>
          <a href="/html/forum.html">Foro</a>
          <a href="javascript:void(0);" class="icon" onclick="myFunction()">
            <i class="fa fa-bars"></i>
          </a>
        </div>
      </header>
      <div class="container">
        <div id="slider" class="slider">
          <figure>
            <img
              src="https://cdn.wallapop.com/images/10420/ip/v7/__/c10420p1131837575/i5643468376.jpg?pictureSize=W640"
              alt="Generador"
              onclick="abrirModal('anuncio1')"
            />
            <img
              src="https://cdn.wallapop.com/images/10420/kb/kf/__/c10420p1228752416/i6309806661.jpg?pictureSize=W640"
              alt=""
              onclick="abrirModal('anuncio2')"
            />
            <img
              src="https://cdn.wallapop.com/images/10420/ke/uj/__/c10420p1234262845/i6316983174.jpg?pictureSize=W640"
              alt=""
              onclick="abrirModal('anuncio3')"
            />
            <img
              src="https://cdn.wallapop.com/images/10420/kf/cp/__/c10420p1235110467/i6329881967.jpg?pictureSize=W640"
              alt=""
              onclick="abrirModal('anuncio4')"
            />
            <img
              src="https://cdn.wallapop.com/images/10420/kf/qu/__/c10420p1235770709/i6325819249.jpg?pictureSize=W640"
              alt=""
              onclick="abrirModal('anuncio5')"
            />
          </figure>
        </div>
      </div>

      <!-- Modal -->
      <div id="modalAnuncio" class="modal">
        <div class="modal-content">
          <span class="cerrar" onclick="cerrarModal()">&times;</span>
          <div id="contenidoAnuncio"></div>
        </div>
      </div>

      <div id="productosDestacados" class="containerProdcuts">
        <!-- \//TODO: tarjetas báscias sobre los productos, obtenidos de Firebase que sigue con la base de datos de la app pública
             \//TODO: añadir funcionalidad para que esto sea automatico; es decir, que dependa del numero de pulsaciones en el boton lo plantaré en el modal -->
        <h2>Productos Destacados</h2>
        <div id="cards" class="cards"></div>
      </div>

      <br />
      <!-- Esto más adelante habrá que borrarlo para que quede un poco más limpio -->

      <h2>Productos Recomendados</h2>
      <div class="filtersMenu">
        <form id="filterRecomends" class="filterRecomends">
          <label for="atentionLvl">Nivel de atención a dar: </label>
          <input
            type="range"
            id="atentionLvl"
            min="0"
            max="10"
            value="5"
            step="1"
          />
          <label for="maxDuration">Espera máxima: </label>
          <select name="maxDuration" id="maxDuration">
            <option value="index">Selecciona nº semanas</option>
            <option value="1">1 semana</option>
            <option value="2">2 semanas</option>
            <option value="3">3 semanas</option>
            <option value="4">4 semanas</option>
            <option value="5">5 semanas</option>
            <option value="6">6 semanas</option>
          </select>

          <label for="typeProduct">Tipo de producto: </label>
          <select name="typeProduct" id="typeProduct">
            <option value="index">Selecciona un tipo</option>
          </select>
        </form>
      </div>
      <div id="productosRecomendados" class="containerProdcuts">
        <div id="cardsRecommends" class="cards recommends"></div>

        <!-- \//TODO: que las recomendacions vayan según el mes en el que nos encontremos y se podría poner un filtro para  -->
      </div>

      <!-- MODAL for info products -->
      <div id="modal" class="modal">
        <div class="modal-content">
          <span id="closeModal" class="close">&times;</span>
          <h2>Character Info:</h2>
          <div id="modalProducts" class="modalProducts"></div>
          <div id="modalLoader" class="loader">Cargando...</div>
        </div>
      </div>
    </main>

    <footer>
      <!-- \//TODO: Poner un enlace para la parte de contacto y que sea también para descargar la app -->
    </footer>
  </body>
</html>
